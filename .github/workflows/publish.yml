name: 'publish'

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.2.3)'
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
    secrets:
      TAURI_SIGNING_PRIVATE_KEY:
        required: true
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD:
        required: true
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  macos:
    permissions:
      contents: write
    runs-on: macos-26

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "${{ inputs.tag }}" ]; then
            echo "Error: tag input required"
            exit 1
          fi
          echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 0

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.tag.outputs.tag }}
          releaseName: ${{ steps.tag.outputs.tag }}
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: '--target aarch64-apple-darwin'

      - name: Validate bundled macOS libraries
        run: |
          set -euo pipefail

          app_path="$(find src-tauri/target -path '*/bundle/macos/*.app' | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "Could not find bundled macOS app"
            exit 1
          fi

          scan_dirs=(
            "$app_path/Contents/MacOS"
            "$app_path/Contents/Frameworks"
            "$app_path/Contents/Libraries"
            "$app_path/Contents/Plugins"
          )

          checked=0
          while IFS= read -r binary; do
            checked=$((checked + 1))
            echo "Inspecting $binary"
            links="$(otool -L "$binary")"
            echo "$links"

            if echo "$links" | grep -E '(/opt/homebrew|/usr/local/Cellar)'; then
              echo "Found Homebrew-linked library in $binary"
              exit 1
            fi

            if echo "$links" | grep -E '(/(opt/homebrew|usr/local/Cellar).*(libssl|libcrypto)|(^|[[:space:]])(libssl|libcrypto)\.)'; then
              echo "Found non-system OpenSSL linkage in $binary"
              exit 1
            fi
          done < <(
            for dir in "${scan_dirs[@]}"; do
              if [ -d "$dir" ]; then
                find "$dir" -type f -print0
              fi
            done | while IFS= read -r -d '' candidate; do
              if file "$candidate" | grep -q 'Mach-O'; then
                printf '%s\n' "$candidate"
              fi
            done
          )

          if [ "$checked" -eq 0 ]; then
            echo "No Mach-O binaries found in bundle to inspect"
            exit 1
          fi
